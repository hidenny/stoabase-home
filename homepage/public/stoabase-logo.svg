<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
      .logo-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; }
    </style>
    <linearGradient id="grad-pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad-base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- ── Icon: Stoa columns ── -->
  <!-- Capital (top horizontal bar) -->
  <rect x="2" y="4"  width="48" height="6" rx="2.5" fill="url(#grad-pillar)"/>
  <!-- 3 columns -->
  <rect x="8"  y="12" width="7" height="28" rx="2" fill="url(#grad-pillar)"/>
  <rect x="22" y="12" width="7" height="28" rx="2" fill="url(#grad-pillar)" opacity="0.8"/>
  <rect x="36" y="12" width="7" height="28" rx="2" fill="url(#grad-pillar)" opacity="0.6"/>
  <!-- Stylobate (bottom horizontal bar) -->
  <rect x="2" y="42" width="48" height="6" rx="2.5" fill="url(#grad-base)"/>

  <!-- Glow dot (decorative) -->
  <circle cx="26" cy="27" r="2.5" fill="#c4b5fd" opacity="0.7"/>

  <!-- ── Wordmark: Stoabase ── -->
  <text x="62" y="39"
        class="logo-text"
        font-size="28"
        letter-spacing="-0.3"
        fill="#f1f5f9">Stoa<tspan fill="#a78bfa">Base</tspan></text>
</svg>
